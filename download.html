        .download-card {

            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 32px 24px;
            text-align: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .file-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: #00f0ff;
        }

        .download-text {
            color: #9a9aa8;
            margin-bottom: 20px;
        }

        .ad-box {
            padding: 20px;
            border: 1px dashed rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            color: #5c5c6a;
            margin-bottom: 16px;
            font-size: 0.85rem;
        }

        .timer {
            font-size: 4rem;
            font-weight: 900;
            color: #00f0ff;
            text-shadow: 0 0 40px rgba(0, 240, 255, 0.3);
            margin-bottom: 16px;
        }

        .download-btn {
            display: none;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #00f0ff, #b44cff);
            color: #000;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .download-btn.show {
            display: block;
            animation: fadeUp 0.5s ease;
        }

        .download-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.4);
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .back-link {
            display: inline-block;
            margin-top: 16px;
            color: #00f0ff;
            text-decoration: none;
            padding: 10px 24px;
            border: 1px solid #00f0ff;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .back-link:hover {
            background: #00f0ff;
            color: #000;
        }
    </style>
